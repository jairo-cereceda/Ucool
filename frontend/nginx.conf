server {
  listen 80;

  types {
    text/html html htm;
    text/css css;
    application/javascript js mjs;
  }

  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ /index.html;
  }

  location /landing/ {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ =404;
  }
}
