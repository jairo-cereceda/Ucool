version: "3.8"

services:
  backend:
    build: ./backend
    container_name: ucool-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://jaiirocereceda:c0cMAechTxIeavPe@ucool.yxq3tub.mongodb.net/?retryWrites=true&w=majority&appName=Ucool
    depends_on:
      - mongo
    networks:
      - ucool-net

  frontend:
    build:
      context: ./frontend
    container_name: ucool-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  mongo:
    image: mongo:latest
    container_name: ucool-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - ucool-mongo-db:/data/db
    networks:
      - ucool-net

volumes:
  ucool-mongo-db:

networks:
  ucool-net:
