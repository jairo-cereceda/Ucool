version: "3.8"

services:
  backend:
    build: ./backend
    container_name: ucool-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/usr/src
      - node_modules_backend:/usr/src/node_modules
    environment:
      - PORT=5000
      - MONGO_URI=mongodb+srv://jaiirocereceda:c0cMAechTxIeavPe@ucool.yxq3tub.mongodb.net/?retryWrites=true&w=majority&appName=Ucool
    depends_on:
      - mongo
    networks:
      - ucool-net

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: ucool-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./ssl/selfsigned.crt:/etc/ssl/certs/selfsigned.crt:ro
      - ./ssl/selfsigned.key:/etc/ssl/private/selfsigned.key:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - ucool-net

  mongo:
    image: mongo:latest
    container_name: ucool-mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - ucool-mongo-db:/data/db
    networks:
      - ucool-net

volumes:
  ucool-mongo-db:
  node_modules_backend:

networks:
  ucool-net:
